services:
  - type: web
    name: ElimuLink-API
    env: python
    plan: free
    branch: main
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ADMIN_PASSCODE_HASH
        secure: true
      - key: ADMIN_JWT_SECRET
        secure: true
      - key: OPENAI_API_KEY
        secure: true
      - key: FIREBASE_ADMIN_SA
        secure: true
      - key: VITE_APP_ID
        value: elimulink-pro-v2
    autoDeploy: true
    disk: 1024
    regions:
      - oregon
