name: Deploy Public

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npx vite build --mode public
      - run: npx firebase deploy --only hosting:elimulink-app-ai --token "${{ secrets.FIREBASE_TOKEN }}"
